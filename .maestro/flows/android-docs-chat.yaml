appId: fi.ircord.android
name: android-docs-chat
tags:
  - docs
---
- killApp
- launchApp:
    stopApp: false
    arguments:
      ircord_screenshot_scene: "chat"
      ircord_screenshot_dark_theme: "true"
      ircord_screenshot_font_scale: "1.0"
- extendedWaitUntil:
    visible: "Landing docs are ready for review."
    timeout: 45000
- assertVisible: "Landing docs are ready for review."
- takeScreenshot:
    path: screenshots/android/chat-view
